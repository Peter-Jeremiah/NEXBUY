<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart</title>
    <!-- We reuse notification.css for the header, and cart.css for the layout -->
    <link rel="stylesheet" href="notification.css"> 
    <link rel="stylesheet" href="cart.css">
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>

    <header class="notif-header">
        <div class="header-left">
            <a href="index.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </a>
            <span class="header-title">Shopping Cart</span>
        </div>
    </header>

    <main class="cart-page-wrapper">
        <div class="cart-items-section">
            <h2 class="section-title" id="cart-item-count">Shopping Cart</h2>
            <div id="cart-container">
                <!-- Cart items will be injected here by cart.js -->
            </div>
        </div>

        <div class="cart-summary-section">
            <div class="summary-card">
                <h3>Order Summary</h3>
                <div class="summary-row">
                    <span>Items:</span>
                    <span id="summary-items">0</span>
                </div>
                <div class="summary-row total-row">
                    <span>Order Total:</span>
                    <span id="summary-total">$0.00</span>
                </div>
                <button class="checkout-btn" onclick="window.location.href='checkout.html'">Proceed to Checkout</button>
            </div>
        </div>
    </main>

    <script src="cart.js"></script>
</body>
</html>
