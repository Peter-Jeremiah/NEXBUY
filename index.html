<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In / Register | NexBuy</title>
    <link rel="stylesheet" href="auth.css">
    
    <script>
        // Check for saved theme right away to prevent flashing
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>
    <div class="watermark"></div>

    <main class="auth-wrapper">
        <div class="auth-card">
            <div class="logo-container" onclick="window.location.href='index.html'">
                <div class="nexbuy-logo">
                    <span class="nex">NEX</span><span class="buy">BUY</span>
                </div>
            </div>

            <h2 id="auth-title">Welcome Back</h2>
            <p id="auth-subtitle">Sign in to continue to your account.</p>

            <form id="auth-form">
                <div class="input-group" id="name-group" style="display: none;">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="e.g. Peter">
                </div>

                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>

                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="auth-btn" id="auth-submit-btn">Sign In</button>
            </form>

            <div class="auth-toggle">
                <span id="toggle-text">Don't have an account?</span> 
                <a href="#" id="toggle-link">Register here</a>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
</body>
</html>
