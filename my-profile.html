<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <link rel="stylesheet" href="profile.css">
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <style>
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: var(--text-sub); font-weight: 600; }
        .form-input { width: 100%; padding: 12px 16px; border: 1px solid var(--border-color); border-radius: 8px; background: var(--bg-page); color: var(--text-main); font-size: 15px; outline: none; }
        .form-input:focus { border-color: var(--accent); }
        .save-profile-btn { width: 100%; background: var(--accent); color: #fff; padding: 14px; font-size: 15px; font-weight: 600; border: none; border-radius: 8px; cursor: pointer; margin-top: 10px; transition: opacity 0.2s; }
        .save-profile-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <header class="profile-header">
        <div class="header-left">
            <a href="profile.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </a>
            <span class="header-title">My Profile Details</span>
        </div>
    </header>

    <main class="profile-main">
        <div class="settings-group" style="padding: 20px;">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" class="form-input" value="Peter">
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" class="form-input" value="jerrypet64@gmail.com">
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" class="form-input" placeholder="+234 800 000 0000">
            </div>
            <button class="save-profile-btn" onclick="showToast('Profile Updated Successfully!')">Save Changes</button>
        </div>
    </main>
    <script src="toast.js"></script>
</body>
</html>
