<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details</title>
    <link rel="stylesheet" href="notification.css">
    <link rel="stylesheet" href="cart.css">
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
    <style>
        /* Similar Items Carousel Styles */
        .similar-items-section {
            width: 100%;
            max-width: 1000px;
            margin: 20px auto 60px;
            display: none; /* Hidden until populated by JS */
        }
        .similar-items-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 15px;
            padding: 0 20px;
        }
        .similar-items-carousel {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 5px 20px 15px;
            scrollbar-width: none; /* Hides scrollbar in Firefox */
        }
        .similar-items-carousel::-webkit-scrollbar {
            display: none; /* Hides scrollbar in Chrome/Safari */
        }
        .similar-card {
            min-width: 140px; max-width: 140px;
            background: var(--bg-card); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 12px; cursor: pointer;
            box-shadow: var(--shadow); transition: transform 0.2s;
            flex-shrink: 0; text-align: center; display: flex; flex-direction: column; justify-content: space-between;
        }
        .similar-card:hover { transform: translateY(-4px); }
        .similar-card img {
            width: 100%; height: 90px; object-fit: contain;
            border-radius: 8px; margin-bottom: 10px; background-color: var(--bg-main);
        }
        .similar-title { font-size: 13px; font-weight: 600; color: var(--text-main); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 5px; }
        .similar-price { font-size: 15px; font-weight: 800; color: var(--accent); }
    </style>
</head>
<body>

    <header class="notif-header">
        <div class="header-left">
            <a href="home.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </a>
            <span class="header-title">Product Details</span>
        </div>
    </header>

    <main class="cart-page-wrapper" style="justify-content: center; margin-top: 40px;">
        <div class="cart-item" style="flex-direction: column; align-items: center; max-width: 450px; width: 100%; padding: 30px; text-align: center;">
            
            <!-- Placeholders for dynamic data -->
            <img id="detail-img" src="" alt="Product Image" style="width: 100%; max-width: 250px; height: 250px; object-fit: contain; border-radius: 12px; margin-bottom: 20px; background-color: var(--bg-main);">
            <h2 id="detail-title" style="margin-bottom: 10px; font-size: 22px; color: var(--text-main);">Loading...</h2>
            <div id="detail-rating-container" style="display: flex; align-items: center; justify-content: center; gap: 4px; margin-bottom: 10px; font-size: 14px; color: var(--text-sub);"></div>
            <div id="detail-price" style="font-size: 26px; font-weight: 800; color: var(--accent); margin-bottom: 15px;"></div>
            
            <div style="width: 100%; height: 1px; background: var(--border-color); margin: 15px 0;"></div>
            
            <h4 style="align-self: flex-start; margin-bottom: 8px; font-size: 14px; color: var(--text-main);">Description</h4>
            <p id="detail-desc" style="color: var(--text-sub); line-height: 1.6; text-align: left; margin-bottom: 25px; width: 100%; font-size: 15px;"></p>
            
            <button class="checkout-btn" id="detail-add-btn" style="margin-top: auto;">Add to Cart</button>
        </div>
    </main>

    <section id="similar-items-section" class="similar-items-section">
        <h3 class="similar-items-title">Similar Items</h3>
        <div class="similar-items-carousel" id="similar-items-container"></div>
    </section>

    <script src="data.js"></script>
    <script src="toast.js"></script>
    <script>
        // 1. Get the product ID from the URL (e.g., ?id=e1)
        const urlParams = new URLSearchParams(window.location.search);
        const productId = urlParams.get('id');

        // 3. Find the specific product that matches the ID
        const product = storeProducts.find(p => p.id === productId);

        // 4. Inject the data into the HTML
        if (product) {
            document.title = product.name + " - NexBuy";
            document.getElementById('detail-img').src = product.image;
            document.getElementById('detail-title').textContent = product.name;
            document.getElementById('detail-price').textContent = '$' + product.price.toFixed(2);
            
            // Inject Stars and Review Count
            if (product.rating && product.reviews) {
                let stars = '<svg width="0" height="0" style="position:absolute"><defs><linearGradient id="halfGrad"><stop offset="50%" stop-color="#fbbf24"/><stop offset="50%" stop-color="var(--border-color)"/></linearGradient></defs></svg>';
                for (let i = 1; i <= 5; i++) {
                    if (product.rating >= i) {
                        stars += '<svg width="18" height="18" viewBox="0 0 24 24" fill="#fbbf24"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>';
                    } else if (product.rating >= i - 0.5) {
                        stars += '<svg width="18" height="18" viewBox="0 0 24 24" fill="url(#halfGrad)"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>';
                    } else {
                        stars += '<svg width="18" height="18" viewBox="0 0 24 24" fill="var(--border-color)"><path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/></svg>';
                    }
                }
                document.getElementById('detail-rating-container').innerHTML = `
                    ${stars}
                    <span style="margin-left:4px; font-weight:bold; color:var(--text-main);">${product.rating}</span> 
                    <span style="margin-left:4px;">(${product.reviews.toLocaleString()} reviews)</span>
                `;
            }

            // Use the specific long description if available, otherwise fall back to the short one
            document.getElementById('detail-desc').textContent = product.longDesc || product.desc;
            
            // 5. Handle "Add to Cart" directly from this page
            document.getElementById('detail-add-btn').onclick = () => {
                let cart = JSON.parse(localStorage.getItem('cart')) || {};
                cart[product.id] = (cart[product.id] || 0) + 1;
                localStorage.setItem('cart', JSON.stringify(cart));
                
                showToast('Added to Cart!');
                const btn = document.getElementById('detail-add-btn');
                btn.textContent = "Added to Cart!";
                btn.style.backgroundColor = "#10b981"; // Success green
            };

            // 6. Populate Similar Items Carousel
            const similarProducts = storeProducts.filter(p => p.subcategory === product.subcategory && p.id !== product.id);
            
            if (similarProducts.length > 0) {
                document.getElementById('similar-items-section').style.display = 'block';
                document.getElementById('similar-items-container').innerHTML = similarProducts.map(sim => `
                    <div class="similar-card" onclick="window.location.href='product.html?id=${sim.id}'">
                        <img src="${sim.image}" alt="${sim.name}">
                        <div class="similar-title">${sim.name}</div>
                        <div class="similar-price">$${sim.price.toFixed(2)}</div>
                    </div>
                `).join('');
            }

        } else {
            document.getElementById('detail-title').textContent = "Product not found";
            document.getElementById('detail-add-btn').style.display = "none";
        }
    </script>
</body>
</html>
