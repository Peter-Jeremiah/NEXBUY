<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Account</title>
    <link rel="stylesheet" href="profile.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    
    <script>
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
        }
    </script>
</head>
<body>

    <header class="profile-header">
        <div class="header-left">
            <a href="home.html" class="back-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </a>
        </div>
    </header>

    <main class="profile-main">
        
        <div class="profile-avatar-section">
            <div class="avatar-wrapper">
                <div class="profile-pic-large" id="profile-initial">P</div>
                
                <img src="" alt="Profile" class="profile-pic-large" id="profile-img" style="display: none; object-fit: contain; background-color: var(--bg-main);">
                
                <button class="edit-badge" id="edit-avatar-btn">
                    <svg viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/>
                    </svg>
                </button>

                <div class="avatar-menu" id="avatar-menu">
                    <label class="avatar-menu-item">
                        Take a picture
                        <input type="file" accept="image/*" capture="environment" id="camera-input" hidden>
                    </label>
                    <label class="avatar-menu-item">
                        Select from gallery
                        <input type="file" accept="image/*" id="gallery-input" hidden>
                    </label>
                    <div class="avatar-menu-item remove-text" id="remove-pic-btn" style="display: none;">
                        Remove picture
                    </div>
                </div>
            </div>
            <h2 class="profile-name-large">Peter</h2>
            <p class="profile-email">jerrypet64@gmail.com</p>
        </div>

        <div class="settings-group">
            <a href="my-profile.html" class="setting-item">
                <div class="setting-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                </div>
                <span class="setting-text">My profile</span>
                <span class="setting-arrow">›</span>
            </a>
            <a href="inbox.html" class="setting-item">
                <div class="setting-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                </div>
                <span class="setting-text">Inbox</span>
                <span class="setting-arrow">›</span>
            </a>
        </div>

        <div class="settings-group">
            <a href="orders.html" class="setting-item">
                <div class="setting-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 8h-3V4H3c-1.1 0-2 .9-2 2v11h2c0 1.66 1.34 3 3 3s3-1.34 3-3h6c0 1.66 1.34 3 3 3s3-1.34 3-3h2v-5l-3-4zM6 18.5c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm13.5-9l1.96 2.5H17V9.5h2.5zm-1.5 9c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
                </div>
                <span class="setting-text">Orders</span>
                <span class="setting-arrow">›</span>
            </a>
            <a href="address-book.html" class="setting-item">
                <div class="setting-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.8-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-.1zM21 18.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-4.15.65-5.5 1.5V8c1.35-.85 3.8-1.5 5.5-1.5 1.2 0 2.4.15 3.5.5v11.5z"/></svg>
                </div>
                <span class="setting-text">Address book</span>
                <span class="setting-arrow">›</span>
            </a>
            <a href="payment-settings.html" class="setting-item">
                <div class="setting-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 4H4c-1.11 0-1.99.89-1.99 2L2 18c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V6c0-1.11-.89-2-2-2zm0 14H4v-6h16v6zm0-10H4V6h16v2z"/></svg>
                </div>
                <span class="setting-text">Payment settings</span>
                <span class="setting-arrow">›</span>
            </a>
            <a href="wish-list.html" class="setting-item">
                <div class="setting-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                </div>
                <span class="setting-text">Wish list</span>
                <span class="setting-arrow">›</span>
            </a>
        </div>

        <div class="settings-group">
            <a href="notification.html" class="setting-item">
                <div class="setting-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.89 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
                </div>
                <span class="setting-text">Notifications</span>
                <span class="setting-arrow">›</span>
            </a>
            <a href="security-centre.html" class="setting-item">
                <div class="setting-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                </div>
                <span class="setting-text">Security centre</span>
                <span class="setting-arrow">›</span>
            </a>
            <a href="feedback.html" class="setting-item">
                <div class="setting-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-3 12H7v-2h10v2zm0-3H7V9h10v2zm0-3H7V6h10v2z"/></svg>
                </div>
                <span class="setting-text">Feedback and suggestions</span>
                <span class="setting-arrow">›</span>
            </a>
        </div>

        <div class="group-label">Need Assistance?</div>
        <div class="settings-group">
            <a href="help-support.html" class="setting-item">
                <div class="setting-icon">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17h-2v-2h2v2zm2.07-7.75l-.9.92C13.45 12.9 13 13.5 13 15h-2v-.5c0-1.1.45-2.1 1.17-2.83l1.24-1.26c.37-.36.59-.86.59-1.41 0-1.1-.9-2-2-2s-2 .9-2 2H8c0-2.21 1.79-4 4-4s4 1.79 4 4c0 .88-.36 1.68-.93 2.25z"/></svg>
                </div>
                <span class="setting-text">Help and support</span>
                <span class="setting-arrow">›</span>
            </a>
        </div>

        <div class="settings-group" style="margin-top: 30px;">
            <a href="index.html" class="setting-item" style="justify-content: center;">
                <span class="setting-text logout-text" style="text-align: center; flex: none;">Log out</span>
            </a>
        </div>

    </main>
    <div class="crop-modal-overlay" id="crop-modal" style="display: none;">
        <div class="crop-modal-content">
            <h3 style="margin-bottom: 16px; font-size: 18px;">Adjust Profile Picture</h3>
            
            <div class="img-container" style="max-height: 350px; width: 100%; margin-bottom: 20px;">
                <img id="image-to-crop" src="" style="max-width: 100%; display: block;">
            </div>
            
            <div class="crop-actions">
                <button class="crop-btn cancel-btn" id="cancel-crop">Cancel</button>
                <button class="crop-btn save-btn" id="save-crop">Crop & Save</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    <script src="profile.js"></script>
</body>
</html>
